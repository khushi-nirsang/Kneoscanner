id: health-check-endpoint

info:
  name: Health Check Endpoint Exposed
  author: khushi-nirsang
  severity: info
  description: Health check or status endpoint is public

requests:
  - method: GET
    path:
      - "{{BaseURL}}/health"
      - "{{BaseURL}}/healthz"
      - "{{BaseURL}}/status"
    matchers:
      - type: word
        part: body
        words:
          - "healthy"
          - "ok"
          - "status"
        condition: or