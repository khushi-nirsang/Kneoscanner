id: security-misconfiguration

info:
  name: Security Misconfiguration
  author: khushi-nirsang
  severity: high
  description: Multiple security headers missing or weak config

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: or
    matchers:
      - type: word
        part: header
        words:
          - "Server:"
          - "X-Powered-By:"
      - type: word
        part: header
        words:
          - "X-Frame-Options"
          - "Content-Security-Policy"
        condition: or   # negative check in code later