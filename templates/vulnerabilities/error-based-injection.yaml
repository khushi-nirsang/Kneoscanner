id: error-based-injection

info:
  name: Error-Based Injection Detection
  author: khushi-nirsang
  severity: high
  description: |
    Detects various injection vulnerabilities through
    error messages and stack traces exposed by the application.
  tags:
    - error-based
    - injection
    - a03:2021

requests:
  - method: GET

    path:
      - "{{BaseURL}}/?id={{payload}}"
      - "{{BaseURL}}/search?q={{payload}}"

    payloads:
      - "payloads/error-injection/error-injection-payloads.txt"

    matchers:

      - type: regex
        part: body
        regex:
          - "(?i)exception"
          - "(?i)error"
          - "(?i)sql"
          - "(?i)java"
          - "(?i)python"
          - "(?i)traceback"
          - "(?i)stack trace"
          - "(?i)at line"
        condition: or

      - type: status
        status:
          - 500
          - 502

    matchers-condition: and

    extractors:
      - type: regex
        part: body
        regex:
          - "(?i)exception[^\\n]*"
          - "(?i)error[^\\n]*"
          - "at .*line.*\\d+"
