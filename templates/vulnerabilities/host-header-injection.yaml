id: host-header-injection

info:
  name: Host Header Injection
  author: khushi-nirsang
  severity: medium
  description: Possible Host Header Injection vulnerability

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    headers:
      - "Host: evil.com"
    matchers:
      - type: word
        part: body
        words:
          - "evil.com"
        condition: and