id: subdomain-takeover

info:
  name: Subdomain Takeover Possible
  author: khushi-nirsang
  severity: high
  description: Subdomain may be vulnerable to takeover

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        part: body
        words:
          - "404 Not Found"
          - "can't find this"
          - "no such app"
          - "herokuapp.com"
        condition: or