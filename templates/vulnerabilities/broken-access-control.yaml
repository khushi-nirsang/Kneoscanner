id: broken-access-control

info:
  name: Broken Access Control Detected
  author: khushi-nirsang
  severity: high
  description: Possible IDOR or unauthorized access

requests:
  - method: GET
    path:
      - "{{BaseURL}}/admin"
      - "{{BaseURL}}/user/1"
      - "{{BaseURL}}/dashboard"
    matchers:
      - type: word
        part: body
        words:
          - "admin panel"
          - "user profile"
          - "dashboard"
        condition: or