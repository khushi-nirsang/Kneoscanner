id: path-traversal

info:
  name: Path Traversal / Directory Traversal
  author: khushi-nirsang
  severity: high
  description: |
    Detects path traversal vulnerabilities allowing unauthorized
    access to files outside the intended directory by using
    directory traversal sequences.
  tags:
    - path-traversal
    - access-control
    - a01:2021

requests:
  - method: GET

    path:
      - "{{BaseURL}}/?file={{payload}}"
      - "{{BaseURL}}/?path={{payload}}"
      - "{{BaseURL}}/?page={{payload}}"
      - "{{BaseURL}}/?template={{payload}}"
      - "{{BaseURL}}/?include={{payload}}"
      - "{{BaseURL}}/?document={{payload}}"
      - "{{BaseURL}}/?filename={{payload}}"
      - "{{BaseURL}}/download?path={{payload}}"
      - "{{BaseURL}}/download?file={{payload}}"
      - "{{BaseURL}}/download?filename={{payload}}"
      - "{{BaseURL}}/view?doc={{payload}}"
      - "{{BaseURL}}/view?file={{payload}}"
      - "{{BaseURL}}/get?id={{payload}}"
      - "{{BaseURL}}/read?filename={{payload}}"
      - "{{BaseURL}}/file?name={{payload}}"
      - "{{BaseURL}}/api/download?file={{payload}}"

    payloads:
      - "payloads/path-traversal/path-traversal-payloads.txt"

    matchers:

      - type: regex
        part: body
        regex:
          - "(?i)root:x:0:0:"
          - "(?i)daemon:x:"
          - "(?i)\\[boot loader\\]"
          - "(?i)for 16-bit app support"
          - "(?i)<\\?php"
          - "(?i)<\\?xml"
          - "(?i)DB_PASSWORD"
          - "(?i)database_password"
          - "(?i)DATABASE_URL"
          - "(?i)database_password"
          - "(?i)api_key"
          - "(?i)secret_key"
          - "(?i)mysql_password"
          - "(?i)aws_secret_access_key"
          - "(?i)BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY"

      - type: status
        status:
          - 200

    matchers-condition: and

    extractors:
      - type: regex
        part: body
        regex:
          - "(?i)(password|secret|key|token)[\\s]*[=:][\\s]*['\"][^'\"]+['\"]"
