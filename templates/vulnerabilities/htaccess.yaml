id: htaccess-file-exposure

info:
  name: .htaccess File Exposure
  author: khushi-nirsang
  severity: medium
  description: .htaccess file is publicly accessible

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.htaccess"
    matchers:
      - type: word
        part: body
        words:
          - "RewriteRule"
          - "AuthType"
        condition: or