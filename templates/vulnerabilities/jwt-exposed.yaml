id: jwt-token-exposure

info:
  name: JWT Token Exposure
  author: khushi-nirsang
  severity: high
  description: JSON Web Token possibly exposed in response

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        part: body
        words:
          - "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
        condition: and