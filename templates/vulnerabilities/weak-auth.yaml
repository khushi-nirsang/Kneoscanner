id: weak-authentication

info:
  name: Weak Authentication Mechanism
  author: khushi-nirsang
  severity: high
  description: Login page without proper protections

requests:
  - method: GET
    path:
      - "{{BaseURL}}/login"
    matchers:
      - type: word
        part: body
        words:
          - "type=\"password\""
          - "remember me"
        condition: and