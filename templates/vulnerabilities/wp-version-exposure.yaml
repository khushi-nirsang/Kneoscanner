id: wordpress-version-exposure

info:
  name: WordPress Version Exposure
  author: khushi-nirsang
  severity: low
  description: WordPress version is exposed in headers or meta tags

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        part: header
        words:
          - "X-Powered-By: WordPress"
          - "wp-"
        condition: or