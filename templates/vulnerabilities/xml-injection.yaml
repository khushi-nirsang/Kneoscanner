id: xml-injection

info:
  name: XML Injection
  author: khushi-nirsang
  severity: medium
  description: Possible XML Injection vulnerability

requests:
  - method: POST
    path:
      - "{{BaseURL}}/api"
    body: "<test>malicious</test>"
    matchers:
      - type: word
        part: body
        words:
          - "XML"
          - "parser error"
        condition: or