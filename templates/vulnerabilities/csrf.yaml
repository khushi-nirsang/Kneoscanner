id: csrf-detection

info:
  name: Missing CSRF Protection
  author: khushi-nirsang
  severity: medium
  description: Detects forms that may lack CSRF protection

requests:
  - method: POST

    path:
      - "{{BaseURL}}/account/update"
      - "{{BaseURL}}/profile/update"
      - "{{BaseURL}}/user/update"
      - "{{BaseURL}}/settings"

    headers:
      Content-Type: application/x-www-form-urlencoded

    body: "email=test@example.com"

    matchers:

      - type: word
        part: body
        words:
          - "csrf"
          - "csrf_token"
          - "_token"
          - "authenticity_token"
        condition: or
        negative: true

      - type: status
        status:
          - 200
          - 302

    matchers-condition: and