id: api-key-leak

info:
  name: API Key Leak in Response
  author: khushi-nirsang
  severity: high
  description: Possible API keys or tokens exposed in response

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        part: body
        words:
          - "sk_live_"
          - "pk_live_"
          - "AIza"
          - "ghp_"
        condition: or