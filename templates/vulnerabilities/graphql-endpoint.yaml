id: graphql-exposed

info:
  name: GraphQL Endpoint Exposed
  author: khushi-nirsang
  severity: info
  description: GraphQL introspection or endpoint is publicly available

requests:
  - method: GET
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/__graphql"
    matchers:
      - type: word
        part: body
        words:
          - "GraphQL"
          - "query"
          - "__schema"
        condition: or