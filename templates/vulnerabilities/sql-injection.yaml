id: sql-injection

info:
  name: SQL Injection Vulnerability
  author: khushi-nirsang
  severity: critical
  description: Detects possible SQL Injection through error-based responses, time delays, or behavioral analysis.
  tags:
    - sql-injection
    - injection
    - a03:2021
    - a03:2017

requests:
  - method: GET

    path:
      - "{{BaseURL}}/?id={{payload}}"
      - "{{BaseURL}}/?search={{payload}}"
      - "{{BaseURL}}/?q={{payload}}"
      - "{{BaseURL}}/?query={{payload}}"
      - "{{BaseURL}}/?user={{payload}}"
      - "{{BaseURL}}/?username={{payload}}"
      - "{{BaseURL}}/?email={{payload}}"
      - "{{BaseURL}}/?category={{payload}}"
      - "{{BaseURL}}/?page={{payload}}"
      - "{{BaseURL}}/?sort={{payload}}"
      - "{{BaseURL}}/?filter={{payload}}"
      - "{{BaseURL}}/?product={{payload}}"
      - "{{BaseURL}}/search?query={{payload}}"
      - "{{BaseURL}}/search?q={{payload}}"
      - "{{BaseURL}}/users?id={{payload}}"
      - "{{BaseURL}}/product?id={{payload}}"
      - "{{BaseURL}}/products?id={{payload}}"
      - "{{BaseURL}}/api/search?q={{payload}}"
      - "{{BaseURL}}/api/users?id={{payload}}"
      - "{{BaseURL}}/api/product?id={{payload}}"

    payloads:
      - "payloads/sqli/error-based-sql-injection-payloads.txt"
      - "payloads/sqli/sql-injection-all-payloads.txt"

    matchers:

      - type: regex
        part: body
        regex:
          - "(?i)sql syntax"
          - "(?i)you have an error in your sql syntax"
          - "(?i)warning.*mysql"
          - "(?i)mysql_fetch"
          - "(?i)mysql_num_rows"
          - "(?i)mysqli"
          - "(?i)postgresql"
          - "(?i)syntax error at or near"
          - "(?i)pg_query"
          - "(?i)pg_exec"
          - "(?i)sqlite"
          - "(?i)sqlite_exception"
          - "(?i)sqlite error"
          - "(?i)ora-[0-9]+"
          - "(?i)oracle error"
          - "(?i)pls-[0-9]+"
          - "(?i)microsoft ole db"
          - "(?i)microsoft sql native client"
          - "(?i)unclosed quotation mark"
          - "(?i)quoted string not properly terminated"
          - "(?i)sqlserver"
          - "(?i)sql server"
          - "(?i)sqlstate"
          - "(?i)odbc"
          - "(?i)jdbc"
          - "(?i)db2 sql error"
          - "(?i)mariadb"
          - "(?i)database error"
          - "(?i)query failed"
          - "(?i)invalid query"
          - "(?i)column.*not.*found"
          - "(?i)table.*not.*found"

    matchers-condition: or

  - method: GET
    
    path:
      - "{{BaseURL}}/?id={{payload}}"
      - "{{BaseURL}}/?search={{payload}}"
      - "{{BaseURL}}/?q={{payload}}"
      - "{{BaseURL}}/?user={{payload}}"
      - "{{BaseURL}}/search?query={{payload}}"
      - "{{BaseURL}}/product?id={{payload}}"
      - "{{BaseURL}}/api/search?q={{payload}}"

    payloads:
      - "payloads/sqli/union-select-sql-injection-payloads.txt"

    matchers:
      - type: word
        part: body
        words:
          - "union"
          - "select"
        condition: and

      - type: status
        status:
          - 200

    matchers-condition: and
