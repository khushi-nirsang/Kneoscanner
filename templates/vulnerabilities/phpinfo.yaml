id: phpinfo-exposure

info:
  name: phpinfo() Exposure
  author: khushi-nirsang
  severity: high
  description: phpinfo file is accessible (critical information disclosure)

requests:
  - method: GET
    path:
      - "{{BaseURL}}/phpinfo.php"
      - "{{BaseURL}}/info.php"
    matchers:
      - type: word
        part: body
        words:
          - "phpinfo()"
          - "PHP Version"
        condition: or