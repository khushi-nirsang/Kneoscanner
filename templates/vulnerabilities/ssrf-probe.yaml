id: ssrf-probe

info:
  name: Potential SSRF Exposure
  author: khushi-nirsang
  severity: high
  description: |
    Detects potential Server Side Request Forgery by checking
    whether cloud metadata responses are exposed.

requests:
  - method: GET

    path:
      - "{{BaseURL}}/?url=http://169.254.169.254/latest/meta-data/"

    matchers:

      - type: word
        part: body
        words:
          - "ami-id"
          - "instance-id"
          - "security-groups"
          - "local-hostname"
        condition: or

      - type: status
        status:
          - 200

    matchers-condition: and