id: ssrf-probe

info:
  name: Potential SSRF Exposure
  author: khushi-nirsang
  severity: high
  description: Detects SSRF using external payload files
  tags:
    - ssrf
    - injection
    - a10:2021
    - a9:2017

requests:
  - method: GET

    payloads:
      - payloads/ssrf/ssrf.txt

    path:
      - "{{BaseURL}}/?url={{payload}}"
      - "{{BaseURL}}/?dest={{payload}}"
      - "{{BaseURL}}/?redirect={{payload}}"
      - "{{BaseURL}}/?next={{payload}}"
      - "{{BaseURL}}/?target={{payload}}"

    matchers:

      - type: word
        part: body
        words:
          - "ami-id"
          - "instance-id"
          - "security-groups"
          - "local-hostname"
        condition: or

      - type: status
        status:
          - 200

      # Do not confuse reflected/rejected URL text with a server-side fetch.
      - type: word
        part: body
        words:
          - "requested resource"
          - "not available"
          - "/static/http://"
        condition: or
        negative: true

    matchers-condition: and
