id: ssrf-probe

info:
  name: Potential SSRF Exposure
  author: khushi-nirsang
  severity: high
  description: Detects SSRF using external payload files

requests:
  - method: GET

    payloads:
      - payloads/ssrf/ssrf.txt

    path:
      - "{{BaseURL}}/?url={{payload}}"
      - "{{BaseURL}}/?dest={{payload}}"
      - "{{BaseURL}}/?redirect={{payload}}"
      - "{{BaseURL}}/?next={{payload}}"
      - "{{BaseURL}}/?target={{payload}}"

    matchers:

      - type: word
        part: body
        words:
          - "ami-id"
          - "instance-id"
          - "security-groups"
          - "local-hostname"
          - "meta-data"
        condition: or

      - type: status
        status:
          - 200

    matchers-condition: and