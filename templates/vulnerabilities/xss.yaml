id: xss-probe

info:
  name: Reflected Cross Site Scripting (XSS)
  author: khushi-nirsang
  severity: medium
  description: |
    Detects reflected XSS by injecting a script payload and
    checking whether it is reflected unescaped in the response.

requests:
  - method: GET

    path:
      - "{{BaseURL}}/?search=%3Cscript%3Ealert(1)%3C%2Fscript%3E"

    matchers:

      - type: word
        part: body
        words:
          - "<script>alert(1)</script>"
        condition: or

      - type: status
        status:
          - 200

    matchers-condition: and