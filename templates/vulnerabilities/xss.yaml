id: xss-probe

info:
  name: Reflected Cross Site Scripting (XSS)
  author: khushi-nirsang
  severity: medium
  description: Detects reflected XSS payloads in responses.
  tags:
    - xss
    - injection
    - a03:2021
    - a03:2017
    - a07:2017

requests:
  - method: GET

    path:
      - "{{BaseURL}}/?search={{payload}}"
      - "{{BaseURL}}/?q={{payload}}"
      - "{{BaseURL}}/?query={{payload}}"
      - "{{BaseURL}}/?keyword={{payload}}"
      - "{{BaseURL}}/?term={{payload}}"
      - "{{BaseURL}}/?name={{payload}}"
      - "{{BaseURL}}/?message={{payload}}"
      - "{{BaseURL}}/?comment={{payload}}"
      - "{{BaseURL}}/?input={{payload}}"
      - "{{BaseURL}}/?redirect={{payload}}"
      - "{{BaseURL}}/search.jsp?query={{payload}}"
      - "{{BaseURL}}/search?query={{payload}}"
      - "{{BaseURL}}/search?q={{payload}}"
      - "{{BaseURL}}/search?keyword={{payload}}"
      - "{{BaseURL}}/results?q={{payload}}"
      - "{{BaseURL}}/profile?name={{payload}}"
      - "{{BaseURL}}/feedback?message={{payload}}"

    payloads:
      - "payloads/xss/xss-reflected-basic.txt"

    matchers:

      - type: word
        part: body
        words:
          - "{{payload}}"

      - type: status
        status:
          - 200
          - 400
          - 500

    matchers-condition: and
