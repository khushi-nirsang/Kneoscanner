id: local-file-inclusion

info:
  name: Local File Inclusion (LFI)
  author: khushi-nirsang
  severity: high
  description: |
    Detects Local File Inclusion vulnerabilities that allow
    reading arbitrary files from the local filesystem.
  tags:
    - lfi
    - access-control
    - a01:2021

requests:
  - method: GET

    path:
      - "{{BaseURL}}/?file={{payload}}"
      - "{{BaseURL}}/?path={{payload}}"
      - "{{BaseURL}}/?page={{payload}}"
      - "{{BaseURL}}/?template={{payload}}"
      - "{{BaseURL}}/?include={{payload}}"
      - "{{BaseURL}}/?lang={{payload}}"
      - "{{BaseURL}}/?document={{payload}}"
      - "{{BaseURL}}/?filename={{payload}}"
      - "{{BaseURL}}/page?id={{payload}}"
      - "{{BaseURL}}/load?document={{payload}}"
      - "{{BaseURL}}/view?file={{payload}}"
      - "{{BaseURL}}/download?file={{payload}}"
      - "{{BaseURL}}/api/file?name={{payload}}"

    payloads:
      - "payloads/lfi/lfi-payloads.txt"

    matchers:

      - type: regex
        part: body
        regex:
          - "(?i)root:x:0:0:"
          - "(?i)daemon:x:"
          - "(?i)bin/(bash|sh)"
          - "(?i)<\\?php"
          - "(?i)<\\?xml"
          - "(?i)\\[boot loader\\]"
          - "(?i)for 16-bit app support"
          - "(?i)DB_PASSWORD"
          - "(?i)DATABASE_URL"
          - "(?i)BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY"

      - type: status
        status:
          - 200

    matchers-condition: and

    extractors:
      - type: regex
        part: body
        regex:
          - "root:.*:0:0:"
          - "<?php.*?>"
