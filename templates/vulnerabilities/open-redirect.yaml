id: open-redirect

info:
  name: Potential Open Redirect
  author: khushi-nirsang
  severity: medium
  description: |
    Detects potential open redirect behavior by checking whether
    user-supplied external URLs appear in redirect responses.

requests:
  - method: GET

    path:
      - "{{BaseURL}}/redirect?url=https://evil.com"

    matchers:

      - type: word
        part: header
        words:
          - "evil.com"
          - "Location"
        condition: and

      - type: status
        status:
          - 301
          - 302
          - 307
          - 308

    matchers-condition: and