id: open-redirect

info:
  name: Potential Open Redirect
  author: khushi-nirsang
  severity: medium
  description: Detects open redirect vulnerabilities using external redirect payloads.
  tags:
    - open-redirect
    - access-control
    - a01:2021
    - a1:2017

requests:
  - method: GET

    redirects: false

    path:
      - "{{BaseURL}}/redirect?url={{payload}}"

    payloads:
      - "payloads/open-redirect/open-redirect-payloads.txt"

    matchers:

      - type: regex
        part: header
        regex:
          - "(?i)location:.*evil\\.com"
          - "(?i)location:.*attacker\\.com"
          - "(?i)location:.*burpcollaborator"
          - "(?i)location:.*interactsh"
          - "(?i)location:.*//"
          - "(?i)location:.*http"

      - type: status
        status:
          - 301
          - 302
          - 303
          - 307
          - 308

    matchers-condition: and
