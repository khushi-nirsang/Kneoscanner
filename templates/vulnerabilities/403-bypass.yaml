id: 403-forbidden-bypass

info:
  name: Possible 403 Bypass
  author: khushi-nirsang
  severity: medium
  description: Potential directory protection bypass

requests:
  - method: GET
    path:
      - "{{BaseURL}}/admin"
      - "{{BaseURL}}/.git"
    matchers:
      - type: status
        status: 
          - 200