id: clickjacking
info:
  name: Clickjacking Vulnerability
  author: khushi-nirsang
  severity: low
  description: |
    Detects potential clickjacking vulnerability by checking if the site
    allows rendering inside an iframe without proper X-Frame-Options or CSP headers.
  tags: clickjacking, security, misconfiguration

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: regex
        regex:
          - "(?i)x-frame-options"
        part: header
        negative: true
        condition: and
      - type: regex
        regex:
          - "(?i)frame-ancestors"
        part: header
        negative: true
        condition: and
