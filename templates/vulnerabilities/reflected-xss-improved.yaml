id: reflected-xss

info:
  name: Reflected XSS Detection
  author: khushi-nirsang
  severity: high
  description: Possible reflected cross-site scripting vulnerability

requests:
  - method: GET
    path:
      - "{{BaseURL}}/?q=<script>alert(1)</script>"
      - "{{BaseURL}}/?search=test%3Cscript%3Ealert(1)%3C/script%3E"
    matchers:
      - type: word
        part: body
        words:
          - "<script>alert(1)</script>"
          - "alert(1)"
        condition: or