id: debug-endpoint-exposure

info:
  name: Exposed Debug Endpoint
  author: khushi-nirsang
  severity: high
  description: Detects common debug, profiling, metrics, or environment endpoints exposed in production.
  risk: safe
  confidence: firm
  tags:
    - debug
    - misconfiguration
    - sensitive-data
    - a05:2021
  remediation: Disable debug endpoints in production or require strong authentication and network restrictions.

requests:
  - method: GET
    path:
      - "{{BaseURL}}/debug"
      - "{{BaseURL}}/debug/pprof/"
      - "{{BaseURL}}/actuator"
      - "{{BaseURL}}/actuator/env"
      - "{{BaseURL}}/actuator/heapdump"
      - "{{BaseURL}}/metrics"
      - "{{BaseURL}}/server-status"
      - "{{BaseURL}}/phpinfo.php"
    matchers:
      - type: regex
        part: body
        regex:
          - "(?i)pprof"
          - "(?i)heapdump"
          - "(?i)system properties"
          - "(?i)environment"
          - "(?i)phpinfo\\(\\)"
          - "(?i)apache server status"
          - "(?i)jvm\\.memory"
          - "(?i)process_cpu_seconds_total"
      - type: status
        status:
          - 200
    matchers-condition: and
