id: graphql-exposure

info:
  name: Exposed GraphQL Console or Schema
  author: khushi-nirsang
  severity: medium
  description: Detects exposed GraphQL consoles, explorers, or introspection-like responses that may reveal API structure.
  risk: safe
  confidence: firm
  tags:
    - graphql
    - api
    - security-misconfiguration
    - a05:2021
  remediation: Disable GraphQL playgrounds and introspection in production unless protected by strong authentication and authorization.

requests:
  - method: GET
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/graphiql"
      - "{{BaseURL}}/playground"
      - "{{BaseURL}}/api/graphql"
    matchers:
      - type: regex
        part: body
        regex:
          - "(?i)graphql"
          - "(?i)graphiql"
          - "(?i)graphql playground"
          - "(?i)__schema"
          - "(?i)query\\s*\\{"
      - type: status
        status:
          - 200
    matchers-condition: and
