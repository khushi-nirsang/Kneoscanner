id: rate-limit-missing

info:
  name: Rate Limiting Not Implemented
  author: khushi-nirsang
  severity: medium
  description: Endpoint does not seem to have rate limiting

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        part: header
        words:
          - "X-RateLimit"
          - "Retry-After"
        condition: or