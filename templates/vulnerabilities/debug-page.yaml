id: debug-page-exposed

info:
  name: Debug Page Exposed
  author: khushi-nirsang
  severity: medium
  description: Application debug information exposed

requests:
  - method: GET
    path:
      - "{{BaseURL}}/debug"
      - "{{BaseURL}}/debug.php"
    matchers:
      - type: word
        part: body
        words:
          - "debug"
          - "environment"
          - "var_dump"
        condition: or