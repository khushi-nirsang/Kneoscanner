id: docker-api-exposed

info:
  name: Docker API Exposed
  author: khushi-nirsang
  severity: high
  description: Docker daemon API is accessible

requests:
  - method: GET
    path:
      - "{{BaseURL}}/v1.24/version"
      - "{{BaseURL}}/_ping"
    matchers:
      - type: word
        part: body
        words:
          - "Docker"
          - "Version"
        condition: or