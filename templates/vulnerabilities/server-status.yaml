id: apache-server-status

info:
  name: Apache Server Status Exposed
  author: khushi-nirsang
  severity: medium
  description: Apache server-status page is publicly accessible

requests:
  - method: GET
    path:
      - "{{BaseURL}}/server-status"
    matchers:
      - type: word
        part: body
        words:
          - "Server Status"
          - "Total Accesses"
        condition: or