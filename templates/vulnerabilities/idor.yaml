id: idor-detection

info:
  name: Potential IDOR Exposure
  author: khushi-nirsang
  severity: high
  description: |
    Detects potential Insecure Direct Object Reference (IDOR)
    by accessing multiple object identifiers and looking
    for exposed user/account information.

requests:
  - method: GET

    payloads:
      - payloads/idor/idor-payloads.txt

    path:
      - "{{BaseURL}}/account?id={{payload}}"
      - "{{BaseURL}}/user?id={{payload}}"
      - "{{BaseURL}}/profile?id={{payload}}"
      - "{{BaseURL}}/api/user/{{payload}}"
      - "{{BaseURL}}/users/{{payload}}"

    matchers:

      - type: word
        part: body
        words:
          - "email"
          - "username"
          - "user_id"
          - "account"
          - "first_name"
          - "last_name"
          - "phone"
          - "address"
        condition: or

      - type: status
        status:
          - 200

    matchers-condition: and

    extractors:
      - type: regex
        part: body
        regex:
          - "(?i)email[^\\n<]*"
          - "(?i)username[^\\n<]*"
          - "(?i)user_id[^\\n<]*"
          - "(?i)phone[^\\n<]*"