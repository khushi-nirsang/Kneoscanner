id: email-disclosure

info:
  name: Email Address Disclosure
  author: khushi-nirsang
  severity: low
  description: Email addresses leaked in response

requests:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers:
      - type: word
        part: body
        words:
          - "@gmail.com"
          - "@yahoo.com"
          - "@outlook.com"
        condition: or